name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          mkdir -p "$RUNNER_TEMP/empty-home"
          touch "$RUNNER_TEMP/empty-npmrc"
          HOME="$RUNNER_TEMP/empty-home" \
          NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/empty-npmrc" \
          NPM_CONFIG_GLOBALCONFIG="$RUNNER_TEMP/empty-npmrc" \
          NPM_CONFIG_REGISTRY="https://registry.npmjs.org/" \
          npm ci --registry=https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ''
          NPM_TOKEN: ''
          NPM_CONFIG_ALWAYS_AUTH: 'false'
          NPM_CONFIG__AUTH: ''
          NPM_CONFIG__AUTHTOKEN: ''

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Pack tarball
        run: npm pack

      - name: Setup npm publish auth
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" ./*.tgz --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
